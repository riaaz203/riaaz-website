<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voor Jou ❤️</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <main class="card">
    <h1>Voor mijn liefste 💖</h1>

    <p id="question">Ben jij de mooiste persoon ooit? 😍</p>

    <div class="buttons">
      <button onclick="answerYes()">Ja 💕</button>
      <button onclick="answerNo()">Nee 🙈</button>
    </div>

    <p id="response"></p>

    <button id="nextBtn" onclick="nextQuestion()" style="display:none;">
      Volgende vraag ➡️
    </button>
  </main>

  <script src="script.js"></script>
</body>
</html>
